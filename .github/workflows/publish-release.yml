name: Publish library on release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.0)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Derive version from tag or input
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
          fi
          echo "VERSION_NAME=$VERSION" >> "$GITHUB_ENV"

      - name: Publish signed artifacts to Sonatype staging API
        env:
          ORG_GRADLE_PROJECT_signing.keyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signing.password: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signing.secretKey: ${{ secrets.SIGNING_SECRET_KEY }}
        run: >
          ./gradlew :core:publishReleasePublicationToSonatypeRepository
          -PVERSION_NAME="$VERSION_NAME"
          -PmavenCentralUsername="${{ secrets.MAVEN_CENTRAL_USERNAME }}"
          -PmavenCentralPassword="${{ secrets.MAVEN_CENTRAL_PASSWORD }}"
          --no-daemon

      - name: Promote deployment to Central Portal
        shell: bash
        run: |
          AUTH=$(printf "%s:%s" "${{ secrets.MAVEN_CENTRAL_USERNAME }}" "${{ secrets.MAVEN_CENTRAL_PASSWORD }}" | base64 | tr -d '\n')
          curl --fail-with-body -X POST \
            -H "Authorization: Bearer ${AUTH}" \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/io.github.adityaa-codes?publishing_type=automatic"

